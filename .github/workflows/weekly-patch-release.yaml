name: weekly-patch-release

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - name: Compute next patch version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh release view --json tagName -q .tagName)
          version=${latest#v}
          IFS='.' read -r major minor patch <<< "$version"
          echo "tag=v${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated patch release"
